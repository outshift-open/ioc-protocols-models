[project]
name = "ioc-cfn-protocols-models"
version = "0.1.0"
description = "L9/SSTP Agentic Workflow Lifecycle protocol models"
authors = [
    {name = "Cisco ETI"}
]
readme = "README.md"
requires-python = "^3.10"
dependencies = [
    "pydantic (>=2.0,<3.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.group.dev.dependencies]
flask = "^2.0.2"
prometheus-flask-exporter = "^0.18.3"
requests = "^2.34.2"
werkzeug = "^2.2.2"

