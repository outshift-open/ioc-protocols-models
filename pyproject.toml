[tool.poetry]
name = "ioc-l9"
version = "0.1.0"
description = "IOC L9 Protocol Package"
authors = []
packages = [{include = "SSTP"}]

[tool.poetry.dependencies]
python = ">=3.10,<3.14"
pydantic = ">=2.0"
json-schema-for-humans = ">=0.47.0"
litellm = ">=1.89.3"
urllib3 = ">=2.7.0"

[tool.poetry.group.dev.dependencies]
datamodel-code-generator = ">=0.25.0"
pytest = ">=7.0.0"
openai = "^2.41.0"
python-dotenv = ">=1.0.0,<2.0"
json-schema-for-humans = ">=0.47.0"
