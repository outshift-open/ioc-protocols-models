# =============================================================================
# Publish Go Module Bindings — Manual Workflow Dispatch
# =============================================================================
#
# This workflow publishes Go language bindings by creating a git tag that
# Go modules can reference. Unlike PyPI, Go modules are distributed via Git.
#
# HOW TO PUBLISH:
#   1. Go to Actions tab → "Publish Go Module Bindings"
#   2. Click "Run workflow"
#   3. Enter the version (e.g., "0.0.6") or leave blank to use schema version
#   4. Workflow validates bindings, runs tests, and creates the git tag
#
# RESULT:
#   Creates tag: SSTP/language_bindings/golang/v{version}
#   Users can then: go get github.com/outshift-open/ioc-protocols-models/SSTP/language_bindings/golang@v{version}
#
# =============================================================================

name: Publish Go Module Bindings

on:
  # Manual trigger via GitHub UI
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.0.6). Leave empty to use schema version.'
        required: false
        type: string
      dry_run:
        description: 'Dry run (validate only, do not create tag)'
        required: false
        type: boolean
        default: false

  # Optional: Auto-trigger when repository version tag is created
  # push:
  #   tags:
  #     - 'v*'

permissions:
  contents: write  # Required to create and push tags

jobs:
  publish-go-module:
    name: Publish Go Module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install go-jsonschema
        run: go install github.com/atombender/go-jsonschema@latest

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using provided version: $VERSION"
          else
            VERSION=$(make -s print-version)
            echo "Using schema version: $VERSION"
          fi

          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "go_module_tag=SSTP/language_bindings/golang/v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          TAG="${{ steps.version.outputs.go_module_tag }}"

          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Tag $TAG already exists on remote"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Tag $TAG does not exist, ready to create"
          fi

      - name: Validate Go module path in go.mod
        run: |
          EXPECTED_PATH="github.com/outshift-open/ioc-protocols-models/SSTP/language_bindings/golang"
          ACTUAL_PATH=$(grep "^module " SSTP/language_bindings/golang/go.mod | awk '{print $2}')

          if [ "$ACTUAL_PATH" != "$EXPECTED_PATH" ]; then
            echo "❌ Error: go.mod has incorrect module path"
            echo "Expected: $EXPECTED_PATH"
            echo "Actual:   $ACTUAL_PATH"
            exit 1
          fi

          echo "✅ go.mod module path is correct: $ACTUAL_PATH"

      - name: Validate Go bindings exist
        run: |
          if [ ! -f "SSTP/language_bindings/golang/data_model.go" ]; then
            echo "❌ Error: Go bindings not found"
            echo "Run 'make generate_bindings LANGUAGE=golang' to generate them"
            exit 1
          fi

          echo "✅ Go bindings exist"

      - name: Run Go tests
        run: |
          echo "Running Go binding tests..."
          make test_bindings LANGUAGE=golang

      - name: Create and push Git tag
        if: |
          steps.check_tag.outputs.exists == 'false' &&
          github.event.inputs.dry_run != 'true'
        run: |
          TAG="${{ steps.version.outputs.go_module_tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Creating tag: $TAG"
          git tag -a "$TAG" -m "IOC L9 Protocol Go module v$VERSION"

          echo "Pushing tag to origin..."
          git push origin "$TAG"

          echo "✅ Published Go module: $TAG"

      - name: Dry run summary
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "🔍 DRY RUN MODE - No tag was created"
          echo ""
          echo "Would have created tag: ${{ steps.version.outputs.go_module_tag }}"
          echo "All validations passed ✅"

      - name: Tag already exists
        if: steps.check_tag.outputs.exists == 'true'
        run: |
          echo "⚠️  Tag ${{ steps.version.outputs.go_module_tag }} already exists"
          echo "To republish, delete the existing tag first:"
          echo "  git tag -d ${{ steps.version.outputs.go_module_tag }}"
          echo "  git push origin :refs/tags/${{ steps.version.outputs.go_module_tag }}"
          exit 1

      - name: Summary
        if: |
          steps.check_tag.outputs.exists == 'false' &&
          github.event.inputs.dry_run != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.go_module_tag }}"

          echo "🎉 Successfully published Go module bindings!"
          echo ""
          echo "Version: v$VERSION"
          echo "Tag: $TAG"
          echo ""
          echo "Users can now install with:"
          echo "  go get github.com/outshift-open/ioc-protocols-models/SSTP/language_bindings/golang@v$VERSION"
          echo ""
          echo "Note: It may take a few minutes for the Go proxy to cache the module."
